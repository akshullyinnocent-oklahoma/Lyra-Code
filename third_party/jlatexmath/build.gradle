plugins {
    id 'com.android.library'
}

android {
    namespace 'ru.noties.jlatexmath.android'
    compileSdk 36

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 36
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.annotation:annotation:1.9.1'
}
